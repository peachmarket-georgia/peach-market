# Docker Compose로 PostgreSQL 실행하기
# ===========================================
#
# 📌 Docker란?
# 컨테이너라는 격리된 환경에서 애플리케이션을 실행할 수 있게 해주는 도구입니다.
# PostgreSQL을 직접 Mac에 설치하지 않고, Docker 컨테이너 안에서 실행합니다.
#
# 📌 Docker Compose란?
# 여러 컨테이너(DB, 캐시 등)를 한 번에 관리할 수 있게 해주는 도구입니다.
# docker-compose.yml 파일에 설정을 정의하면, 명령어 하나로 모든 서비스를 실행합니다.
#
# ===========================================
# 사용법
# ===========================================
#
# 1️⃣ Docker Desktop 설치 (아직 안 했다면)
#    👉 https://www.docker.com/products/docker-desktop/ 에서 다운로드
#
# 2️⃣ PostgreSQL 컨테이너 실행
#    터미널에서 프로젝트 루트에서:
#    $ docker compose up -d
#    
#    -d 옵션: 백그라운드에서 실행 (터미널을 닫아도 계속 실행)
#
# 3️⃣ 실행 확인
#    $ docker compose ps
#    
#    Status가 "running"이면 성공!
#
# 4️⃣ 로그 확인 (문제 발생 시)
#    $ docker compose logs -f postgres
#
# 5️⃣ 컨테이너 중지
#    $ docker compose down
#
# 6️⃣ 컨테이너 + 데이터 삭제 (완전 초기화)
#    $ docker compose down -v
#    
#    ⚠️ -v 옵션: 볼륨(데이터)까지 삭제. 개발 중 DB 초기화할 때 사용
#
# ===========================================

services:
  # PostgreSQL 데이터베이스
  postgres:
    # 공식 PostgreSQL 이미지, 버전 16
    image: postgres:16-alpine
    
    # 컨테이너 이름 (docker ps에서 보이는 이름)
    container_name: peachmarket-db
    
    # 환경 변수 설정
    environment:
      # DB 접속 정보 - apps/api/.env에서 동일하게 사용
      POSTGRES_USER: peachmarket
      POSTGRES_PASSWORD: peachmarket123
      POSTGRES_DB: peachmarket
    
    # 포트 매핑: 호스트:컨테이너
    # localhost:5432로 접속하면 컨테이너의 5432 포트로 연결
    ports:
      - "5432:5432"
    
    # 데이터 영속성 (컨테이너 삭제해도 데이터 유지)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    # 헬스체크 (DB가 준비됐는지 확인)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peachmarket"]
      interval: 5s
      timeout: 5s
      retries: 5

# 볼륨 정의 (데이터 저장소)
volumes:
  postgres_data:
