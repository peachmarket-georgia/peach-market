name: peach-market

services:
  postgres:
    image: postgres:17-alpine
    container_name: peachmarket-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    env_file:
      - ../apps/api/.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U peachmarket -d peachmarket']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
